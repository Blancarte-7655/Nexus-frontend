<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS — Registro de Criminales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <link rel="stylesheet" href="src/css/styles.css">
  <script>(function(){const t=sessionStorage.getItem('nexus_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
  <div id="nav-container"></div>
  <div class="page-hero">
    <div class="hero-tag">// INFORMACIÓN CLASIFICADA</div>
    <div class="ph-title">Registro de <span>Criminales</span></div>
    <div class="ph-sub" id="ph-sub"></div>
  </div>
  <div class="content-area">
    <div class="toolbar">
      <div class="search-wrap"><i class="ti ti-search search-icon" aria-hidden="true"></i><input class="search-box" id="crim-search" placeholder="// buscar alias, nombre o cargos..." oninput="renderGrid()"></div>
      <button class="flt-btn act" onclick="setFiltro('todos',this)">Todos</button>
      <button class="flt-btn" onclick="setFiltro('detenido',this)">Detenidos</button>
      <button class="flt-btn" onclick="setFiltro('activo',this)">Activos</button>
    </div>
    <div style="font-size:.52rem;color:var(--text3);font-family:var(--mono);margin-bottom:.5rem;">// click en una tarjeta para ver el expediente completo</div>
    <div class="crim-grid" id="crim-grid"></div>
  </div>
  <script src="src/js/app.js"></script>
  <script>
    initNav('criminales');
    const activos=CRIMINALES.filter(c=>c.activo).length;
    document.getElementById('ph-sub').textContent=`${CRIMINALES.length} expedientes · ${activos} sospechosos activos · Acceso restringido`;
    let filtro='todos';
    function setFiltro(f,btn){filtro=f;document.querySelectorAll('.flt-btn').forEach(b=>b.classList.remove('act'));btn.classList.add('act');renderGrid();}
    function renderGrid(){
      const q=document.getElementById('crim-search').value.toLowerCase();
      let lista=CRIMINALES;
      if(filtro==='detenido')lista=lista.filter(c=>!c.activo);
      if(filtro==='activo')lista=lista.filter(c=>c.activo);
      if(q)lista=lista.filter(c=>c.alias.toLowerCase().includes(q)||c.nombre.toLowerCase().includes(q)||c.cargos.toLowerCase().includes(q));
      const grid=document.getElementById('crim-grid');
      if(!lista.length){grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text3);font-family:var(--mono);">// sin resultados</div>`;return;}
      grid.innerHTML=lista.map(c=>`<div class="crim-card ${c.activo?'pending':''}" onclick="abrirCriminal(${c.id})"><div class="crim-head"><div><div class="crim-alias">${c.alias}</div><div class="crim-fullname">${c.nombre}</div></div><div style="text-align:right;"><div class="crim-exp">EXP-${padId(c.id,4)}</div><span class="pill ${c.activo?'pill-act':'pill-cap'}" style="margin-top:.22rem;display:inline-block;">${c.activo?'Activo':'Detenido'}</span></div></div><div class="crim-charges">${c.cargos}</div><div class="crim-footer"><span class="crim-condena">Condena: <b>${c.condena}</b></span><span style="font-size:.44rem;color:var(--text3);font-family:var(--mono);">${c.casos_ids.length} caso(s)</span></div></div>`).join('');
    }
    renderGrid();
  </script>
</body>
</html>
