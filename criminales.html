<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS — Registro de Criminales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:wght@300;400;600;700&family=Share+Tech+Mono&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <link rel="stylesheet" href="src/css/styles.css">
  <script>(function () { const t = sessionStorage.getItem('nexus_theme') || 'dark'; document.documentElement.setAttribute('data-theme', t); })();</script>
</head>

<body>
  <div id="nav-container"></div>
  <div class="page-hero">
    <div class="hero-tag">// INFORMACIÓN CLASIFICADA</div>
    <div class="ph-title">Registro de <span>Criminales</span></div>
    <div class="ph-sub" id="ph-sub"></div>
  </div>
  <div class="content-area">
    <div class="toolbar">
      <div class="search-wrap"><i class="ti ti-search search-icon" aria-hidden="true"></i><input class="search-box"
          id="crim-search" placeholder="// buscar alias, nombre o cargos..." oninput="renderGrid()"></div>
      <button class="flt-btn act" onclick="setFiltro('todos',this)">Todos</button>
      <button class="flt-btn" onclick="setFiltro('detenido',this)">Detenidos</button>
      <button class="flt-btn" onclick="setFiltro('activo',this)">Activos</button>
    </div>
    <div style="font-size:.52rem;color:var(--text3);font-family:var(--mono);margin-bottom:.5rem;">// click en una
      tarjeta para ver el expediente completo</div>
    <div class="crim-grid" id="crim-grid"></div>
  </div>
  <script src="src/js/api.js"></script>
  <script src="src/js/app.js"></script>
  <script>
    initNav('criminales');
    mostrarLoader('crim-grid');
    let filtro = 'todos', todosLosCriminales = [];

    async function init() {
      try {
        todosLosCriminales = await apiGetCriminales();
        const activos = todosLosCriminales.filter(c => c.activo).length;
        document.getElementById('ph-sub').textContent = `${todosLosCriminales.length} expedientes · ${activos} sospechosos activos · Acceso restringido`;
        renderGrid();
      } catch (e) { mostrarError('crim-grid'); }
    }

    function setFiltro(f, btn) { filtro = f; document.querySelectorAll('.flt-btn').forEach(b => b.classList.remove('act')); btn.classList.add('act'); renderGrid(); }

    function renderGrid() {
      const q = document.getElementById('crim-search').value.toLowerCase();
      let lista = todosLosCriminales;
      if (filtro === 'detenido') lista = lista.filter(c => !c.activo);
      if (filtro === 'activo') lista = lista.filter(c => c.activo);
      if (q) lista = lista.filter(c => c.alias?.toLowerCase().includes(q) || c.nombre?.toLowerCase().includes(q) || c.cargos?.toLowerCase().includes(q));
      const grid = document.getElementById('crim-grid');
      if (!lista.length) { grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text3);font-family:var(--mono);">// sin resultados</div>`; return; }
      grid.innerHTML = lista.map(c => `<div class="crim-card ${c.activo ? 'pending' : ''}" onclick="abrirCriminalAPI(${c.id_criminal})"><div class="crim-head"><div><div class="crim-alias">${c.alias || '—'}</div><div class="crim-fullname">${c.nombre}</div></div><div style="text-align:right;"><div class="crim-exp">EXP-${padId(c.id_criminal, 4)}</div><span class="pill ${c.activo ? 'pill-act' : 'pill-cap'}" style="margin-top:.22rem;display:inline-block;">${c.activo ? 'Activo' : 'Detenido'}</span></div></div><div class="crim-charges">${c.cargos || '—'}</div><div class="crim-footer"><span class="crim-condena">Condena: <b>${c.condena}</b></span></div></div>`).join('');
    }

    async function abrirCriminalAPI(id) {
      try {
        const cr = await apiGetCriminal(id);
        const casosHTML = cr.casos?.length ? cr.casos.map(c => `<div class="caso-mini"><span class="case-num">C-${padId(c.id_caso)}</span><span style="font-family:var(--title);font-size:.72rem;font-weight:600;color:var(--white);flex:1;">${c.asunto}</span>${badge(c.estado)}</div>`).join('') : `<div style="font-size:.56rem;color:var(--text3);font-family:var(--mono);">// sin casos vinculados</div>`;
        document.body.insertAdjacentHTML('beforeend', `<div class="overlay open" id="crim-overlay" onclick="cerrarModal('crim-overlay','crim-modal')"><div class="modal" id="crim-modal" onclick="event.stopPropagation()"><div class="modal-head"><div><div class="modal-title">${cr.alias}</div><div class="modal-sub">EXP-${padId(cr.id_criminal, 4)} · ${cr.nombre}</div></div><button class="modal-close" onclick="cerrarModal('crim-overlay','crim-modal')"><i class="ti ti-x"></i></button></div><div class="modal-body"><div class="info-grid"><div class="info-cell"><div class="info-label">Nombre</div><div class="info-value" style="font-size:.62rem;">${cr.nombre}</div></div><div class="info-cell"><div class="info-label">DNI</div><div class="info-value cyan">${cr.dni || '—'}</div></div><div class="info-cell"><div class="info-label">Condena</div><div class="info-value ${cr.activo ? 'amber' : 'green'}">${cr.condena}</div></div><div class="info-cell"><div class="info-label">Estatus</div><div class="info-value ${cr.activo ? 'amber' : 'green'}">${cr.activo ? 'Activo / Prófugo' : 'Detenido'}</div></div></div><div><div class="modal-section-title">Cargos</div><div style="background:var(--panel);border:1px solid var(--border);border-left:2px solid var(--red);padding:.75rem .9rem;font-size:.65rem;color:var(--text);line-height:1.7;font-style:italic;">${cr.cargos}</div></div><div><div class="modal-section-title">Casos Vinculados (${cr.casos?.length || 0})</div>${casosHTML}</div></div></div></div>`);
      } catch (e) { console.error(e); }
    }

    init();
  </script>
</body>

</html>
