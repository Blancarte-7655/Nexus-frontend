<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS — Directorio de Detectives</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <link rel="stylesheet" href="src/css/styles.css">
  <script>(function(){const t=sessionStorage.getItem('nexus_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
  <div id="nav-container"></div>
  <div class="page-hero">
    <div class="hero-tag">MÓDULO DE PERSONAL</div>
    <div class="ph-title">Directorio de <span>Detectives</span></div>
    <div class="ph-sub" id="ph-sub"></div>
  </div>
  <div class="content-area">
    <div class="toolbar">
      <div class="search-wrap"><i class="ti ti-search search-icon" aria-hidden="true"></i><input class="search-box" id="det-search" placeholder="// buscar nombre, rango o departamento..." oninput="renderGrid()"></div>
      <button class="flt-btn act" onclick="setFiltro('todos',this)">Todos</button>
      <button class="flt-btn" onclick="setFiltro('Investigador',this)">Investigadores</button>
      <button class="flt-btn" onclick="setFiltro('Analista',this)">Analistas</button>
      <button class="flt-btn" onclick="setFiltro('Capturista',this)">Capturistas</button>
      <button class="flt-btn" onclick="setFiltro('Administrativo',this)">Administrativos</button>
    </div>
    <div style="font-size:.52rem;color:var(--text3);font-family:var(--mono);margin-bottom:.5rem;">// click en una tarjeta para ver casos y próximos movimientos</div>
    <div class="det-grid" id="det-grid"></div>
  </div>
  <script src="src/js/app.js"></script>
  <script>
    initNav('detectives');
    document.getElementById('ph-sub').textContent=`${DETECTIVES.length} agentes en activo · División Metropolitana GDL`;
    let filtroRol='todos';
    function setFiltro(f,btn){filtroRol=f;document.querySelectorAll('.flt-btn').forEach(b=>b.classList.remove('act'));btn.classList.add('act');renderGrid();}
    function renderGrid(){
      const q=document.getElementById('det-search').value.toLowerCase();
      let lista=DETECTIVES;
      if(filtroRol!=='todos')lista=lista.filter(d=>d.rol===filtroRol);
      if(q)lista=lista.filter(d=>d.nombre.toLowerCase().includes(q)||d.rango.toLowerCase().includes(q)||d.dpto.toLowerCase().includes(q));
      const grid=document.getElementById('det-grid');
      if(!lista.length){grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text3);font-family:var(--mono);">// sin resultados</div>`;return;}
      grid.innerHTML=lista.map(d=>`<div class="det-card" onclick="abrirDetective(${d.id})"><div class="det-card-top"><div class="det-card-av">${ini(d.nombre)}</div><div><div class="det-card-nm">${d.nombre}</div><div class="det-card-user">@${d.user}</div></div></div><div class="det-info-row"><span class="di-lbl">Rango</span><span class="di-val">${d.rango}</span></div><div class="det-info-row"><span class="di-lbl">Departamento</span><span class="di-val">${d.dpto}</span></div><div class="det-info-row"><span class="di-lbl">Rol</span><span class="di-val">${d.rol}</span></div><div class="det-info-row"><span class="di-lbl">Casos activos</span><span class="di-val" style="color:var(--cyan);">${d.casos_ids.length}</span></div></div>`).join('');
    }
    renderGrid();
  </script>
</body>
</html>
