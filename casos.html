<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS — Expedientes de Casos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <link rel="stylesheet" href="src/css/styles.css">
  <script>(function(){const t=sessionStorage.getItem('nexus_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
  <div id="nav-container"></div>
  <div class="page-hero">
    <div class="hero-tag">MÓDULO DE EXPEDIENTES</div>
    <div class="ph-title">Expedientes de <span>Casos</span></div>
    <div class="ph-sub" id="ph-sub"></div>
  </div>
  <div class="content-area">
    <div class="toolbar">
      <div class="search-wrap"><i class="ti ti-search search-icon" aria-hidden="true"></i><input class="search-box" id="caso-search" placeholder="// buscar caso, descripción, zona, etiqueta..." oninput="renderTabla()"></div>
      <button class="flt-btn act" onclick="setFiltro('todos',this)">Todos</button>
      <button class="flt-btn" onclick="setFiltro('Abierto',this)">Abiertos</button>
      <button class="flt-btn" onclick="setFiltro('En investigación',this)">Investigando</button>
      <button class="flt-btn" onclick="setFiltro('Cerrado',this)">Cerrados</button>
    </div>
    <div style="font-size:.52rem;color:var(--text3);font-family:var(--mono);margin-bottom:.5rem;">// click en cualquier fila para ver el detalle completo del caso</div>
    <div class="tbl-wrap" id="tabla-container"></div>
  </div>
  <script src="src/js/app.js"></script>
  <script>
    initNav('casos');
    document.getElementById('ph-sub').textContent=`${CASOS.length} registros · Base de datos · División Metropolitana GDL`;
    let filtroEstado='todos';
    function setFiltro(f,btn){filtroEstado=f;document.querySelectorAll('.flt-btn').forEach(b=>b.classList.remove('act'));btn.classList.add('act');renderTabla();}
    function renderTabla(){
      const q=document.getElementById('caso-search').value.toLowerCase();
      let lista=CASOS;
      if(filtroEstado!=='todos')lista=lista.filter(c=>c.estado===filtroEstado);
      if(q)lista=lista.filter(c=>c.asunto.toLowerCase().includes(q)||c.desc.toLowerCase().includes(q)||c.zona.toLowerCase().includes(q)||c.tags.some(t=>t.includes(q)));
      const cont=document.getElementById('tabla-container');
      if(!lista.length){cont.innerHTML=`<div style="text-align:center;padding:3rem;color:var(--text3);font-family:var(--mono);font-size:.75rem;">// sin resultados</div>`;return;}
      cont.innerHTML=`<table class="tbl"><thead><tr><th style="width:4.5rem">ID</th><th>Caso</th><th>Zona</th><th>Detective</th><th>Fecha</th><th>Estado</th><th>Presupuesto</th><th>Etiquetas</th></tr></thead><tbody>${lista.map(c=>`<tr onclick="abrirCaso(${c.id})"><td style="font-family:var(--mono);color:var(--text3);">C-${padId(c.id)}</td><td><div class="tbl-title">${c.asunto}</div><div class="tbl-desc">${c.desc}</div></td><td style="font-size:.58rem;color:var(--text2);">${c.zona}</td><td style="color:var(--text2);font-size:.6rem;">${c.detective}</td><td style="color:var(--text3);font-size:.6rem;white-space:nowrap;font-family:var(--mono);">${c.fecha}</td><td>${badge(c.estado)}</td><td class="budget">$${fmt(c.presupuesto)}</td><td>${c.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</td></tr>`).join('')}</tbody></table>`;
    }
    renderTabla();
  </script>
</body>
</html>
