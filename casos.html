<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS — Expedientes de Casos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:wght@300;400;600;700&family=Share+Tech+Mono&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <link rel="stylesheet" href="src/css/styles.css">
  <script>(function () { const t = sessionStorage.getItem('nexus_theme') || 'dark'; document.documentElement.setAttribute('data-theme', t); })();</script>
</head>

<body>
  <div id="nav-container"></div>
  <div class="page-hero">
    <div class="hero-tag">MÓDULO DE EXPEDIENTES</div>
    <div class="ph-title">Expedientes de <span>Casos</span></div>
    <div class="ph-sub" id="ph-sub"></div>
  </div>
  <div class="content-area">
    <div class="toolbar">
      <div class="search-wrap"><i class="ti ti-search search-icon" aria-hidden="true"></i><input class="search-box"
          id="caso-search" placeholder="// buscar caso, descripción, zona, etiqueta..." oninput="renderTabla()"></div>
      <button class="flt-btn act" onclick="setFiltro('todos',this)">Todos</button>
      <button class="flt-btn" onclick="setFiltro('Abierto',this)">Abiertos</button>
      <button class="flt-btn" onclick="setFiltro('En investigación',this)">Investigando</button>
      <button class="flt-btn" onclick="setFiltro('Cerrado',this)">Cerrados</button>
    </div>
    <div style="font-size:.52rem;color:var(--text3);font-family:var(--mono);margin-bottom:.5rem;">// click en cualquier
      fila para ver el detalle completo del caso</div>
    <div class="tbl-wrap" id="tabla-container"></div>
  </div>
  <script src="src/js/api.js"></script>
  <script src="src/js/app.js"></script>
  <script>
    initNav('casos');
    mostrarLoader('tabla-container');
    let filtroEstado = 'todos', todosLosCasos = [];

    async function init() {
      try {
        todosLosCasos = await apiGetCasos();
        document.getElementById('ph-sub').textContent = `${todosLosCasos.length} registros · Base de datos · División Metropolitana GDL`;
        renderTabla();
      } catch (e) { mostrarError('tabla-container'); }
    }

    function setFiltro(f, btn) { filtroEstado = f; document.querySelectorAll('.flt-btn').forEach(b => b.classList.remove('act')); btn.classList.add('act'); renderTabla(); }

    function renderTabla() {
      const q = document.getElementById('caso-search').value.toLowerCase();
      let lista = todosLosCasos;
      if (filtroEstado !== 'todos') lista = lista.filter(c => c.estado === filtroEstado);
      if (q) lista = lista.filter(c => c.asunto.toLowerCase().includes(q) || c.descripcion?.toLowerCase().includes(q) || (c.etiquetas || []).some(t => t.includes(q)));
      const cont = document.getElementById('tabla-container');
      if (!lista.length) { cont.innerHTML = `<div style="text-align:center;padding:3rem;color:var(--text3);font-family:var(--mono);font-size:.75rem;">// sin resultados</div>`; return; }
      cont.innerHTML = `<table class="tbl"><thead><tr><th style="width:4.5rem">ID</th><th>Caso</th><th>Detective</th><th>Fecha</th><th>Estado</th><th>Presupuesto</th><th>Etiquetas</th></tr></thead><tbody>${lista.map(c => `<tr onclick="abrirCasoAPI(${c.id_caso})"><td style="font-family:var(--mono);color:var(--text3);">C-${padId(c.id_caso)}</td><td><div class="tbl-title">${c.asunto}</div><div class="tbl-desc">${c.descripcion || ''}</div></td><td style="color:var(--text2);font-size:.6rem;">${c.detective || '—'}</td><td style="color:var(--text3);font-size:.6rem;white-space:nowrap;font-family:var(--mono);">${c.fecha_apertura?.split('T')[0] || ''}</td><td>${badge(c.estado)}</td><td class="budget">$${fmt(Number(c.presupuesto) || 0)}</td><td>${(c.etiquetas || []).map(t => `<span class="tag">${t}</span>`).join('')}</td></tr>`).join('')}</tbody></table>`;
    }

    async function abrirCasoAPI(id) {
      try {
        mostrarLoader('tabla-container', '// cargando expediente...');
        const c = await apiGetCaso(id);
        renderTabla(); // restaurar tabla
        _modal(c);
      } catch (e) { renderTabla(); }
    }

    function _modal(c) {
      const inv = c.involucrados?.length ? c.involucrados.map(p => `<div class="involucrado-row"><div class="det-av">${ini(p.nombre)}</div><div style="flex:1"><div style="font-family:var(--title);font-size:.72rem;font-weight:600;color:var(--white);">${p.nombre}</div><div style="font-size:.54rem;color:var(--text2);margin-top:.1rem;font-style:italic;">${p.declaracion || ''}</div></div><span class="rol-badge rol-${p.rol}">${p.rol}</span></div>`).join('') : `<div style="font-size:.56rem;color:var(--text3);font-family:var(--mono);">// sin involucrados</div>`;
      const ev = c.evidencias?.length ? c.evidencias.map(e => `<div class="evid-mini"><div class="evid-icon" style="width:28px;height:28px;font-size:.85rem;"><i class="ti ${evIconClass(e.tipo)}"></i></div><div style="flex:1"><div class="evid-type" style="font-size:.44rem;">${e.tipo}</div><div style="font-size:.6rem;color:var(--white);">${e.descripcion}</div>${e.ruta_archivo ? `<div class="evid-path">${e.ruta_archivo}</div>` : `<div class="evid-nofile">// evidencia física</div>`}</div><div style="font-size:.42rem;color:var(--text3);font-family:var(--mono);">EV-${padId(e.id_evidencia, 4)}</div></div>`).join('') : `<div style="font-size:.56rem;color:var(--text3);font-family:var(--mono);">// sin evidencias</div>`;
      document.body.insertAdjacentHTML('beforeend', `<div class="overlay open" id="caso-overlay" onclick="cerrarModal('caso-overlay','caso-modal')"><div class="modal" id="caso-modal" onclick="event.stopPropagation()"><div class="modal-head"><div><div class="modal-title">${c.asunto}</div><div class="modal-sub">C-${padId(c.id_caso)} · ${c.fecha_apertura?.split('T')[0] || ''}</div></div><button class="modal-close" onclick="cerrarModal('caso-overlay','caso-modal')"><i class="ti ti-x"></i></button></div><div class="modal-body"><div><div class="modal-section-title">Información General</div><div class="info-grid"><div class="info-cell"><div class="info-label">Estado</div><div class="info-value">${badge(c.estado)}</div></div><div class="info-cell"><div class="info-label">Detective</div><div class="info-value cyan">${c.detective || '—'}</div></div><div class="info-cell"><div class="info-label">Presupuesto</div><div class="info-value cyan">$${fmt(Number(c.presupuesto) || 0)}</div></div><div class="info-cell"><div class="info-label">Departamento</div><div class="info-value">${c.dpto || '—'}</div></div><div class="info-cell"><div class="info-label">Fecha apertura</div><div class="info-value">${c.fecha_apertura?.split('T')[0] || '—'}</div></div><div class="info-cell"><div class="info-label">Etiquetas</div><div class="info-value">${(c.etiquetas || []).map(t => `<span class="tag">${t}</span>`).join('') || '—'}</div></div></div></div><div><div class="modal-section-title">Descripción</div><div style="background:var(--panel);border:1px solid var(--border);border-left:2px solid var(--cyan3);padding:.75rem .9rem;font-size:.65rem;color:var(--text);line-height:1.7;">${c.descripcion || '—'}</div></div><div><div class="modal-section-title">Involucrados (${c.involucrados?.length || 0})</div>${inv}</div><div><div class="modal-section-title">Evidencias (${c.evidencias?.length || 0})</div>${ev}</div></div></div></div>`);
    }

    init();
  </script>
</body>

</html>
