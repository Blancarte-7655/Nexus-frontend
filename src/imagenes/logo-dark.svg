<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="prism-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a0e8f0"/>
      <stop offset="50%" stop-color="#00c8e0"/>
      <stop offset="100%" stop-color="#0066aa"/>
    </linearGradient>
    <linearGradient id="ray1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <linearGradient id="ray2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Pyramid icon -->
  <polygon points="60,15 100,75 20,75" fill="none" stroke="url(#prism-dark)" stroke-width="1.5" opacity="0.9"/>
  <polygon points="60,15 100,75 80,90 40,90 20,75" fill="none" stroke="url(#prism-dark)" stroke-width="1" opacity="0.5"/>
  <line x1="60" y1="15" x2="60" y2="90" stroke="#00c8e0" stroke-width="0.5" opacity="0.4"/>
  <!-- Rays -->
  <line x1="100" y1="45" x2="140" y2="30" stroke="#00e5ff" stroke-width="1.5" opacity="0.8"/>
  <line x1="100" y1="50" x2="145" y2="50" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
  <line x1="100" y1="55" x2="138" y2="68" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
  <!-- Fingerprint dots -->
  <circle cx="148" cy="28" r="2" fill="#00e5ff" opacity="0.8"/>
  <circle cx="155" cy="45" r="2" fill="#00c8e0" opacity="0.8"/>
  <circle cx="148" cy="62" r="2" fill="#f59e0b" opacity="0.8"/>
  <!-- Text NEXUS -->
  <text x="170" y="55" font-family="'Rajdhani', 'Barlow Condensed', sans-serif" font-size="36" font-weight="700" fill="#ffffff" letter-spacing="4">NEXUS</text>
  <!-- Subtitle -->
  <text x="170" y="73" font-family="'Barlow Condensed', sans-serif" font-size="10" fill="#6a8098" letter-spacing="2">SISTEMA INTEGRAL DE CONTROL CRIMINAL</text>
</svg>
